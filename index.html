<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">
    <div class="display">
      <span class="expression" id="expression"></span>
      <span class="result" id="result">0</span>
    </div>

    <div class="buttons">
      <button class="btn btn-clear span-two" data-action="clear">C</button>
      <button class="btn btn-op" data-action="backspace">⌫</button>
      <button class="btn btn-op" data-value="/">÷</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn btn-op" data-value="*">×</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn btn-op" data-value="-">−</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn btn-op" data-value="+">+</button>

      <button class="btn span-two" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn btn-equal" data-action="equal">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
